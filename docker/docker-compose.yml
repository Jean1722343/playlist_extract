services:
  transcripcion_playlist:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../transcripciones:/app/transcripciones
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000').read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s